name: petconnect
description: Trusted pet matching, adoption, and services platform.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.5.11

  # UI / UX
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_card_swiper: ^7.0.1

  # Media
  image_picker: ^1.1.2
  image: ^4.2.0
  video_player: ^2.9.1

  # Location + maps
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0

  # Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Payments
  flutter_stripe: ^11.1.0
  webview_flutter: ^4.9.0    # for Paymob iframe

  # Misc
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
